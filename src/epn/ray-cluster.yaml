apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: ray-impala-job
  namespace: default
spec:
  entrypoint: python /app/epn.py
  shutdownAfterJobFinishes: true
  
  rayClusterSpec:
    rayVersion: '2.9.0'
    headGroupSpec:
      rayStartParams:
        dashboard-host: '0.0.0.0'
      template:
        spec:
          nodeSelector:
            role: headnode
          containers:
            - name: ray-head
              image: youracr.azurecr.io/ray-impala-cu118:v1
              env:
                - name: AZURE_STORAGE_CONNECTION_STRING
                  value: "YOUR_STORAGE_CONNECTION_STRING_HERE"
                - name: TF_USE_LEGACY_KERAS 
                  value: "1"
              resources:
                limits:
                  nvidia.com/gpu: 1
                  cpu: "6"  
                  memory: "50Gi" 
                requests:
                  nvidia.com/gpu: 1
                  cpu: "6"
                  memory: "50Gi"
    workerGroupSpecs:
      - groupName: worker-group
        replicas: 60 
        minReplicas: 60
        maxReplicas: 60
        rayStartParams: {}
        template:
          spec:
            nodeSelector:
              role: worker 
            containers:
              - name: ray-worker
                image: youracr.azurecr.io/ray-impala-cu118:v1
                env:
                  - name: AZURE_STORAGE_CONNECTION_STRING
                    value: "YOUR_STORAGE_CONNECTION_STRING_HERE"
                  - name: TF_USE_LEGACY_KERAS
                    value: "1"
                resources:
                  limits:
                    cpu: "1"  
                    memory: "2Gi"
                  requests:
                    cpu: "1"
                    memory: "2Gi"